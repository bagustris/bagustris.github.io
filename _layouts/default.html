---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ page.lang | default: site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body class="book-layout">

    {% include browser-upgrade.html %}

    <!-- Mobile header -->
    <div class="mobile-header">
      <button class="sidebar-toggle" type="button" aria-label="Toggle sidebar">
        <span class="navicon"></span>
      </button>
      <span class="mobile-site-title">{{ site.title }}</span>
    </div>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay"></div>

    <!-- Left sidebar -->
    <aside class="book-sidebar">
      {% include sidebar.html %}
    </aside>

    <!-- Main content -->
    <main class="book-content">
      {{ content }}

      <div class="page__footer">
        <footer>
          {% include footer/custom.html %}
          {% include footer.html %}
        </footer>
      </div>
    </main>

    {% include scripts.html %}

    <script>
      (function() {
        var toggle = document.querySelector('.sidebar-toggle');
        var sidebar = document.querySelector('.book-sidebar');
        var overlay = document.querySelector('.sidebar-overlay');

        if (!toggle || !sidebar || !overlay) return;

        function openSidebar() {
          sidebar.classList.add('open');
          overlay.classList.add('active');
          toggle.classList.add('close');
        }
        function closeSidebar() {
          sidebar.classList.remove('open');
          overlay.classList.remove('active');
          toggle.classList.remove('close');
        }
        function toggleSidebar(e) {
          e.preventDefault();
          if (sidebar.classList.contains('open')) {
            closeSidebar();
          } else {
            openSidebar();
          }
        }

        toggle.addEventListener('click', toggleSidebar);
        toggle.addEventListener('touchend', function(e) {
          e.preventDefault();
          toggleSidebar(e);
        });

        overlay.addEventListener('click', closeSidebar);
        overlay.addEventListener('touchend', function(e) {
          e.preventDefault();
          closeSidebar();
        });

        window.addEventListener('resize', function() {
          if (window.innerWidth > 768) closeSidebar();
        });
      })();
    </script>

  </body>
</html>
